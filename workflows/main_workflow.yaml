main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-central1"
          - shopify_ingestion_job_name: ${args.shopify_ingestion_job_name}
          - facebook_ads_ingestion_job_name: ${args.facebook_ads_ingestion_job_name}
          - tiktok_ads_ingestion_job_name: ${args.tiktok_ads_ingestion_job_name}
          - transformation_job_name: ${args.transformation_job_name}
          - poll_interval_seconds: 10
          - max_polls: 6 # 1 minute (6 * 10 seconds)

    - run_all_ingestion_jobs_parallel:
        parallel:
          branches:
            - shopify_ingestion:
                steps:
                  - call_shopify_ingestion:
                      call: execute_single_ingestion_job
                      args:
                        job_name: ${shopify_ingestion_job_name}
                        project: ${project}
                        location: ${location}
                        poll_interval_seconds: ${poll_interval_seconds}
                        max_polls: ${max_polls}
            - facebook_ads_ingestion:
                steps:
                  - call_facebook_ads_ingestion:
                      call: execute_single_ingestion_job
                      args:
                        job_name: ${facebook_ads_ingestion_job_name}
                        project: ${project}
                        location: ${location}
                        poll_interval_seconds: ${poll_interval_seconds}
                        max_polls: ${max_polls}
            - tiktok_ads_ingestion:
                steps:
                  - call_tiktok_ads_ingestion:
                      call: execute_single_ingestion_job
                      args:
                        job_name: ${tiktok_ads_ingestion_job_name}
                        project: ${project}
                        location: ${location}
                        poll_interval_seconds: ${poll_interval_seconds}
                        max_polls: ${max_polls}

    - run_transformation:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + location + "/jobs/" + transformation_job_name}
        result: transformation_operation

    - poll_transformation:
        call: poll_operation
        args:
          operation_name: ${transformation_operation.name}
          poll_interval_seconds: ${poll_interval_seconds}
          max_polls: ${max_polls}
        result: final_transformation_lro_status

    - check_transformation_result:
        switch:
          - condition: ${final_transformation_lro_status.body.error}
            next: fail_transformation
        next: success

    - fail_transformation:
        raise: "Transformation job failed"
    - success:
        return: "All jobs completed successfully."

execute_single_ingestion_job:
  params: [job_name, project, location, poll_interval_seconds, max_polls]
  steps:
    - run_job:
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + location + "/jobs/" + job_name}
        result: job_operation
    - poll_job:
        call: poll_operation
        args:
          operation_name: ${job_operation.name}
          poll_interval_seconds: ${poll_interval_seconds}
          max_polls: ${max_polls}
        result: final_lro_status
    - check_job_result:
        switch:
          - condition: ${final_lro_status.body.error}
            raise: ${"An ingestion job failed. Check Cloud Run job logs for " + job_name + " for details."}
        next: end_job

    - end_job:
        return: "Ingestion job completed successfully."

poll_operation:
  params: [operation_name, poll_interval_seconds, max_polls]
  steps:
    - init_polling_vars:
        assign:
          - poll_count: 0
    - poll_loop_start:
        switch:
          - condition: ${poll_count < max_polls}
            next: get_lro_status
          - condition: ${poll_count >= max_polls}
            raise: "Operation timed out after ${max_polls} polls."
    - get_lro_status:
        call: http.get
        args:
          url: ${"https://run.googleapis.com/v2/" + operation_name}
          auth:
            type: OAuth2
        result: lro_status
    - check_lro_done:
        switch:
          - condition: ${lro_status.body.done}
            return: ${lro_status} # Return the final status
        next: increment_poll_count
    - increment_poll_count:
        assign:
          - poll_count: ${poll_count + 1}
        next: sleep_before_next_poll
    - sleep_before_next_poll:
        call: sys.sleep
        args:
          seconds: ${poll_interval_seconds}
        next: poll_loop_start