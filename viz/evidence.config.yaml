appearance:
  default: dark
  switcher: false

layout: false

theme:
  colors:
    primary:
      light: "#14b8a6" # Teal
      dark: "#14b8a6"
    accent:
      light: "#e11d48" # Rose/Pink
      dark: "#e11d48"
    base:
      light: "#ffffff"
      dark: "#1a1a1a" # Dark background
    info:
      light: "#0284c7"
      dark: "#38bdf8"
    positive:
      light: "#10b981"
      dark: "#10b981"
    warning:
      light: "#f59e0b"
      dark: "#f59e0b"
    negative:
      light: "#ef4444"
      dark: "#ef4444"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }

